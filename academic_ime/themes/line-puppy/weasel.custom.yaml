patch:
  "style/color_scheme": line_puppy
  "style/font_face": "Microsoft YaHei"
  "style/font_point": 13
  "style/horizontal": true
  "style/inline_preedit": true
  "style/label_format": "%s"
  "style/layout/+":
    min_width: 180
    border_width: 1
    margin_x: 12
    margin_y: 8
    spacing: 8
    candidate_spacing: 16
    hilite_spacing: 4
    hilite_padding: 6
    hilite_padding_x: 8
    hilite_padding_y: 6
    corner_radius: 10
    round_corner: 10
    shadow_radius: 4
    shadow_offset_x: 1
    shadow_offset_y: 1

  "preset_color_schemes/line_puppy":
    name: "线条小狗／Line Puppy"
    author: "AcademicIME"
    back_color: 0xF8F3E8
    border_color: 0xD8C7AE
    shadow_color: 0x00000018
    text_color: 0x5A4636
    candidate_text_color: 0x6A5542
    candidate_back_color: 0xF8F3E800
    comment_text_color: 0x9A8878
    label_color: 0xB8A088
    hilited_text_color: 0x3F2F25
    hilited_back_color: 0xF2E2B8
    hilited_candidate_text_color: 0x3F2F25
    hilited_candidate_back_color: 0xF2E2B8
    hilited_candidate_border_color: 0xE8D4A0
    hilited_label_color: 0x3F2F25
    hilited_comment_text_color: 0x7A6756
